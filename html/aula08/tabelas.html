<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table>
        <caption>Média de Matemática</caption>
        <thead>
            <tr>
                <th>nome do aluno</th>
                <th>nota do aluno</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>aluno a</td>
                <td>7</td>
            </tr>
            <tr>
                <td>aluno b</td>
                <td>5</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>média</td>
                <td>6</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
