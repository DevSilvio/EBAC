<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap avançado</title>
    <link rel="stylesheet" href="lib/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <button class="btn btn-success m-top-10" data-bs-toggle="modal" data-bs-target="#testeModal">
            Abrir modal
        </button>
        <div class="modal" data-bs-backdrop="static" id="testeModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="h4">cabeçalho do modal teste</h1>
                        <button class="btn-close" type="button" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <h2 class="h6">
                            Lorem ipsum dolor sit amet consectetur adipisicing elit. Eius fugiat id est tempora, debitis alias voluptas necessitatibus! Asperiores cumque laboriosam doloribus ab? Minus officia facere incidunt officiis laudantium sapiente nesciunt!
                        </h2>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-success" data-bs-dismiss="modal">Confirmar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="lib/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function(){
            const modalTeste = new bootstrap.Modal("#testeModal");
            setTimeout(function(){
                modalTeste.show();
            },2000);

        })
    </script>
</body>
</html>
