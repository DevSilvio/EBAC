<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap avançado</title>
    <link rel="stylesheet" href="lib/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <button type="button" class="btn btn-warning" id="botaoAlerta">Ver Alertas</button>
        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div class="toast" data-bs-autohide="false" id="toastID">
                <div class="toast-header">
                    <strong class="me-auto text-danger">Mensagem de ALERTA</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body">
                    você tem 10 mensagem não vista!
                </div>
            </div>
        </div>
    </div>
    <script src="lib/bootstrap.bundle.min.js"></script>
    <script>
        const botaoAlerta = document.getElementById('botaoAlerta');
        const toastAlerta = document.getElementById('toastID')
        botaoAlerta.addEventListener('click', function(){
            const toast = new bootstrap.Toast(toastAlerta)
            toast.show();
        })
    </script>
</body>
</html>
