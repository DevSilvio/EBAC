<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Avançado</title>
    <link rel="stylesheet" href="lib/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <div id="imagens" class="carousel slide carousel-fade" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div data-bs-interval="3000" class="carousel-item active">
                    <img class="d-block w-100" src="https://cdn.pixabay.com/photo/2022/04/15/07/58/sunset-7133867_960_720.jpg" alt="foto da narureza">
                </div>
                <div data-bs-interval="3000" class="carousel-item">
                    <img class="d-block w-100" src="https://cdn.pixabay.com/photo/2022/08/08/19/36/landscape-7373484_960_720.jpg" alt="foto da narureza">
                </div>
                <div data-bs-interval="3000" class="carousel-item">
                    <img class="d-block w-100" src="https://cdn.pixabay.com/photo/2015/06/19/21/24/avenue-815297_960_720.jpg" alt="foto da narureza">
                </div>
            </div>
            <button class="carousel-control-prev" data-bs-target="#imagens" data-bs-slide="prev" type="button">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" data-bs-target="#imagens" data-bs-slide="next" type="button">
                <span class="carousel-control-next-icon"></span>
            </button>
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#imagens" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#imagens" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#imagens" data-bs-slide-to="2"></button>
            </div>
            </div>
            </div>
        </div>
    </div>
    <script src="lib/bootstrap.bundle.min.js.js"></script>
</body>
</html>
