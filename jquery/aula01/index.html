<body>
    <header>
        <h1>Galeria de fotos</h1>
        <button type="button"> Nova imagem +</button>

        <button type="submit">Adicionar</button>
        <button type="reset" id="cancelar">Cancelar</button>
    </form>
    <ul>
        <li>
            <img src="imagens/foto1.jpg" alt="pintura de gato">
            <div class="fotoLink">
                <a href="imagens/foto1.jpg" title="Pintura de gato">Ver imagem tamanho real</a>
            </div>
        </li>
        <li>
            <img src="imagens/foto2.jpg" alt="imagem de um cisnei rosa">
            <div class="fotoLink">
                <a href="imagens/foto1.jpg" title="imagem de um cisnei rosa">Ver imagem tamanho real</a>
            </div>
        </li>
        <li>
            <img src="imagens/foto3.jpg" alt="imagem de cachorros sendo resgatados">
            <div class="fotoLink">
                <a href="imagens/foto1.jpg" title="imagem de cachorros sendo resgatados">Ver imagem tamanho real</a>
            </div>
        </li>
